server:
  port: 8009
  address: 127.0.0.1

spring:
  application:
    name: business
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:h2:./data/nce
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /rest/api-docs
  swagger-ui:
    path: /rest/swagger-ui.html
    enabled: true
